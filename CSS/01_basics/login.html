<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin:0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: rgb(168, 151, 151);
            border-radius: 8px;
            padding:30px;
            width:300px;

        }
        h2{
            color:#1a1a1a;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
           
        }

        input{
            margin-bottom:15px ;
            padding:10px;
            border-radius: 5px;
            background-color: rgb(157, 150, 150);
        }
        button{
            background-color: green;
            color:#fff;
            border-radius: 8px;
        }
        button:hover{
            background-color: blue;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Login</h2>
        <form action="">
            <input type="email" placeholder="email">
            <input type="password" placeholder="password">
            <button type="submit">Login</button>
        </form>
    </div>
    
</body>
</html>
